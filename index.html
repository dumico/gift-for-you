<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给你的小惊喜 💝</title>
  <!-- 可爱的中文字体 -->
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #ffeef8 0%, #e8f4f8 50%, #fff5f5 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      color: #5a5a5a;
      text-align: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 装饰性漂浮元素 */
    .floating-hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      opacity: 0.3;
      animation: floatHeart 8s ease-in-out infinite;
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 500px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 2.8em;
      background: linear-gradient(135deg, #ff8fab 0%, #b5b9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      animation: gentleBounce 3s ease-in-out infinite;
    }

    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .image-container {
      margin: 30px 0;
      position: relative;
    }

    .main-image {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 40px rgba(255, 143, 171, 0.3);
      animation: softPulse 4s ease-in-out infinite;
    }

    @keyframes softPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(255, 143, 171, 0.3); }
      50% { transform: scale(1.02); box-shadow: 0 15px 50px rgba(255, 143, 171, 0.4); }
    }

    .question {
      margin: 35px 0;
      font-size: 1.4em;
      color: #6b6b6b;
      font-weight: 500;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .button {
      padding: 15px 35px;
      background: linear-gradient(135deg, #ff8fab 0%, #ffc2d1 100%);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 25px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.1em;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(255, 143, 171, 0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .button:hover::before {
      width: 300px;
      height: 300px;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 143, 171, 0.5);
    }

    .button.no {
      background: linear-gradient(135deg, #a8d8ea 0%, #d4e5ed 100%);
      box-shadow: 0 4px 15px rgba(168, 216, 234, 0.4);
    }

    .button.no:hover {
      box-shadow: 0 8px 25px rgba(168, 216, 234, 0.5);
    }

    .cute-icon {
      font-size: 2.5em;
      margin: 20px 0;
      animation: wiggle 2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }

    .music-btn {
      margin-top: 40px;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      color: #ff8fab;
      border: 2px solid rgba(255, 143, 171, 0.3);
      cursor: pointer;
      border-radius: 25px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1em;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .music-btn:hover {
      background: rgba(255, 143, 171, 0.1);
      transform: scale(1.05);
    }

    .music-btn.playing {
      background: rgba(255, 143, 171, 0.2);
      border-color: #ff8fab;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      h1 { font-size: 2.2em; }
      .question { font-size: 1.2em; }
      .button { padding: 12px 25px; font-size: 1em; }
      .main-image { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>
  <!-- 漂浮的心形装饰 -->
  <div class="floating-hearts">
    <span class="heart" style="left: 10%; animation-delay: 0s;">💕</span>
    <span class="heart" style="left: 30%; animation-delay: 2s;">💖</span>
    <span class="heart" style="left: 50%; animation-delay: 4s;">💗</span>
    <span class="heart" style="left: 70%; animation-delay: 1s;">💝</span>
    <span class="heart" style="left: 90%; animation-delay: 3s;">💘</span>
  </div>

  <div class="container">
    <h1>嗨～ 你好呀 ✨</h1>
    
    <div class="image-container">
      <img src="./img/ahatamatar.gif" alt="可爱GIF" class="main-image">
    </div>

    <div class="question">
      <p>今天想我了没？👀</p>
    </div>

    <div class="button-container">
      <button class="button yes" onclick="nextQuestion('yes')">超想！💕</button>
      <button class="button no" onclick="nextQuestion('no')">一般般啦～</button>
    </div>

    <div class="cute-icon">🌸</div>

    <audio id="music" loop>
      <source src="./music/summer.mp3" type="audio/mp3">
    </audio>

    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
      <span>🎵</span> 播放音乐
    </button>
  </div>

  <script>
    const music = document.getElementById("music");
    const btn = document.getElementById("musicBtn");
    
    // 页面加载时：恢复播放状态
    window.addEventListener('load', () => {
      const wasPlaying = localStorage.getItem('musicPlaying') === 'true';
      const currentTime = parseFloat(localStorage.getItem('musicTime') || '0');
      
      if (wasPlaying) {
        music.currentTime = currentTime;
        music.play().then(() => {
          btn.innerHTML = "<span>🎶</span> 暂停音乐";
          btn.classList.add("playing");
        }).catch(() => {
          // 自动播放被阻止，保持暂停状态
          btn.innerHTML = "<span>🎵</span> 播放音乐";
          btn.classList.remove("playing");
        });
      }
    });
    
    // 页面跳转前：保存播放状态
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('musicPlaying', !music.paused);
      localStorage.setItem('musicTime', music.currentTime);
    });
    
    function toggleMusic() {
      if (music.paused) {
        music.play();
        btn.innerHTML = "<span>🎶</span> 暂停音乐";
        btn.classList.add("playing");
        localStorage.setItem('musicPlaying', 'true');
      } else {
        music.pause();
        btn.innerHTML = "<span>🎵</span> 播放音乐";
        btn.classList.remove("playing");
        localStorage.setItem('musicPlaying', 'false');
      }
    }

    function nextQuestion(answer) {
      // 保存当前播放状态
      localStorage.setItem('musicPlaying', !music.paused);
      localStorage.setItem('musicTime', music.currentTime);
      
      // 添加过渡动画
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.5s';
      
      setTimeout(() => {
        window.location.href = 'question2.html';
      }, 500);
    }
  </script>
</body>
</html>
