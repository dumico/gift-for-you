<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给你的小惊喜 💝</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #ffeef8 0%, #e8f4f8 50%, #fff5f5 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      color: #5a5a5a;
      text-align: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .floating-hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      opacity: 0.3;
      animation: floatHeart 8s ease-in-out infinite;
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
    }

    .success-icon {
      font-size: 5em;
      margin-bottom: 20px;
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    h1 {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 2.5em;
      background: linear-gradient(135deg, #ff8fab 0%, #b5b9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .message {
      font-size: 1.2em;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .highlight {
      background: linear-gradient(135deg, #ff8fab 0%, #b5b9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 30px;
      margin: 30px 0;
      box-shadow: 0 10px 40px rgba(255, 143, 171, 0.2);
    }

    .wish-display {
      font-size: 1.1em;
      color: #888;
      margin: 15px 0;
    }

    .wish-content {
      font-size: 1.3em;
      color: #ff8fab;
      font-weight: 500;
      margin: 10px 0;
      padding: 15px;
      background: rgba(255, 143, 171, 0.1);
      border-radius: 15px;
    }

    .footer-text {
      margin-top: 40px;
      font-size: 0.95em;
      color: #999;
    }

    .heart-decoration {
      font-size: 1.5em;
      margin: 0 5px;
      display: inline-block;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .restart-btn {
      margin-top: 30px;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      color: #ff8fab;
      border: 2px solid rgba(255, 143, 171, 0.3);
      cursor: pointer;
      border-radius: 25px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1em;
      transition: all 0.3s ease;
    }

    .restart-btn:hover {
      background: rgba(255, 143, 171, 0.1);
      transform: scale(1.05);
    }

    @media (max-width: 480px) {
      h1 { font-size: 2em; }
      .success-icon { font-size: 4em; }
      .message { font-size: 1.1em; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="floating-hearts">
    <span class="heart" style="left: 10%; animation-delay: 0s;">🎉</span>
    <span class="heart" style="left: 30%; animation-delay: 2s;">💕</span>
    <span class="heart" style="left: 50%; animation-delay: 4s;">✨</span>
    <span class="heart" style="left: 70%; animation-delay: 1s;">💖</span>
    <span class="heart" style="left: 90%; animation-delay: 3s;">🎊</span>
  </div>

  <div class="container">
    <div class="success-icon">🎉</div>

    <h1>愿望已收到！</h1>

    <p class="message">
      你的愿望我已经记在小本本上啦
      <br>
      放心，一定会实现的～
    </p>

    <div class="card" id="wishCard" style="display: none;">
      <p class="wish-display">你许下的愿望是：</p>
      <p class="wish-content" id="wishContent"></p>
      <p class="wish-display">许愿人：<span id="wisherName"></span></p>
    </div>

    <p class="message">
      <span class="heart-decoration">💕</span>
      谢谢你的陪伴
      <span class="heart-decoration">💕</span>
    </p>

    <button class="restart-btn" onclick="goHome()">再玩一次 🔄</button>

    <p class="footer-text">
      Made with <span class="heart-decoration">❤️</span> for you
    </p>
  </div>

  <!-- 音乐播放 -->
  <audio id="music" loop>
    <source src="./music/summer.mp3" type="audio/mp3">
  </audio>

  <script>
    const music = document.getElementById("music");
    
    // 页面加载时：恢复播放状态
    window.addEventListener('load', () => {
      const wasPlaying = localStorage.getItem('musicPlaying') === 'true';
      const currentTime = parseFloat(localStorage.getItem('musicTime') || '0');
      
      if (wasPlaying) {
        music.currentTime = currentTime;
        music.play().catch(() => {});
      }
      
      // 继续显示愿望的逻辑
      const { name, message } = getUrlParams();
      if (name || message) {
        document.getElementById('wishCard').style.display = 'block';
        if (name) document.getElementById('wisherName').textContent = name;
        if (message) document.getElementById('wishContent').textContent = message;
      }
      
      // 淡入动画
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.5s';
      setTimeout(() => {
        document.body.style.opacity = '1';
      }, 100);
    });
    
    // 页面跳转前：保存播放状态
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('musicPlaying', !music.paused);
      localStorage.setItem('musicTime', music.currentTime);
    });

    // 获取 URL 参数显示愿望
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        name: params.get('name'),
        message: params.get('message')
      };
    }

    function goHome() {
      // 保存播放状态
      localStorage.setItem('musicPlaying', !music.paused);
      localStorage.setItem('musicTime', music.currentTime);
      
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.5s';
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 500);
    }
  </script>
</body>
</html>
